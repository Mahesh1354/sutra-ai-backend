# Server Configuration
server.port=8080

# Logging
logging.level.com.aura.aiassistant=DEBUG
logging.level.org.springframework.web=INFO

# Add these lines for better debugging
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.aura.ai_assistant=DEBUG
logging.level.org.springframework.security=DEBUG

# Disable CSRF for development (since we're not using Spring Security yet)
spring.security.enabled=false

# Increase JSON nesting depth
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.serialization.fail-on-empty-beans=false
